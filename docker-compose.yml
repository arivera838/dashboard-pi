version: '3.8'

services:
  dashboard:
    build: .
    image: dashboard-pi:latest
    container_name: dashboard-pi-service
    
    # Descomenta la siguiente línea en tu Raspberry Pi (Linux) para permitir al escáner de red
    # realizar barridos ARP reales sobre la WiFi física de tu hogar.
    # Nota: Si usas network_mode: host, debes comentar la sección 'ports' de abajo.
    # network_mode: host

    ports:
      - "8080:8080"
    volumes:
      # Montar socket de docker del host para gestionar contenedores desde la app
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistencia de la base de datos local JSON de dispositivos
      - ./known_devices.json:/app/known_devices.json
      # Opcional: Montajes de lectura de hardware si corre en un host Linux/Raspberry real
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    # devices:
    #   # Descomentar en Raspberry Pi (Linux) para dar acceso a las cámaras físicas al contenedor
    #   - "/dev/video0:/dev/video0"
    #   - "/dev/video1:/dev/video1"
    restart: unless-stopped
